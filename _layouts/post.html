---
layout: default
---
<article class="post-card">
  <header class="post-header">
    <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
    <h1 class="post-title">{{ page.title }}</h1>
  </header>
  <div class="post-body">
    {{ content }}
  </div>
</article>
<nav class="post-nav">
  <a href="{{ '/' | relative_url }}">&larr; All posts</a>
</nav>
